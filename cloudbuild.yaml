# DEPRECATED: This file is no longer used for deployment. The application is now configured for standalone frontend preview.
steps:
# Step 1: Build and package the application using Google Cloud Native Buildpacks.
# This builder automatically detects the Node.js project, installs dependencies (using caching),
# builds the workspaces, and creates a runnable container image without needing a Dockerfile.
- name: 'gcr.io/k8s-skaffold/pack'
  id: 'Build with Buildpacks'
  entrypoint: 'pack'
  args:
  - 'build'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/afm-repo/afm-contract-generator:$COMMIT_SHA'
  - '--builder=gcr.io/buildpacks/builder:v1'
  - '--path=.' # The root of the repository is the build context.

# Step 2: Push the built image to Google Artifact Registry.
- name: 'gcr.io/cloud-builders/docker'
  id: 'Push Image'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/afm-repo/afm-contract-generator:$COMMIT_SHA']
  waitFor: ['Build with Buildpacks']

# Step 3: Deploy the new image to Cloud Run.
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'Deploy Service'
  entrypoint: 'gcloud'
  args: [
    'run', 'deploy', 'afm-contract-generator',
    '--image=us-central1-docker.pkg.dev/$PROJECT_ID/afm-repo/afm-contract-generator:$COMMIT_SHA',
    '--region=us-central1',
    '--platform=managed',
    '--allow-unauthenticated',
    '--set-secrets=JWT_SECRET=afm-jwt-secret:latest,API_KEY=afm-api-key:latest'
  ]
  waitFor: ['Push Image']

# List the final image that will be available in Artifact Registry.
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/afm-repo/afm-contract-generator:$COMMIT_SHA'

options:
  # Using a more powerful machine type speeds up the buildpack analysis and npm install steps.
  machineType: 'N1_HIGHCPU_8'
